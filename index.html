            <line x1={oxSvg-20} y1={oySvg} x2={oxSvg-20} y2={oySvg+roomH*sc} stroke="var(--t3)" strokeWidth={.8}/>
            <line x1={oxSvg-26} y1={oySvg} x2={oxSvg-14} y2={oySvg} stroke="var(--t3)" strokeWidth={.8}/>
            <line x1={oxSvg-26} y1={oySvg+roomH*sc} x2={oxSvg-14} y2={oySvg+roomH*sc} stroke="var(--t3)" strokeWidth={.8}/>
            <text x={oxSvg-24} y={oySvg+roomH*sc/2} textAnchor="middle" fill="var(--t3)" fontSize={10}
              fontFamily="JetBrains Mono,monospace" transform={`rotate(-90,${oxSvg-24},${oySvg+roomH*sc/2})`}>{roomH} mm</text>
          </>}

          {/* Hover tooltip */}
          {hoverTile!==null&&computeTiles.tiles[hoverTile]&&(()=>{
            const t=computeTiles.tiles[hoverTile];
            const tx=oxSvg+(t.x||0)*sc+20,ty=oySvg+(t.y||0)*sc-10;
            return<g>
              <rect x={tx-4} y={ty-14} width={110} height={18} rx={4} fill="rgba(0,0,0,.85)"/>
              <text x={tx} y={ty} fill="#fff" fontSize={10} fontFamily="JetBrains Mono,monospace">
                {t.full?`${Math.round(t.origW)}×${Math.round(t.origH)}`:`Coupe: ${Math.round(t.w)}×${Math.round(t.h)}`}
              </text>
            </g>;
          })()}
        </svg>
      </div>}
      {/* 3D Three.js */}
      {view3D&&<div ref={mountRef} style={{flex:1,background:'#1a1e2e',cursor:'grab'}}/>}
    </div>

    {/* ─── RIGHT PANEL: RESULTS ─── */}
    <div style={{width:240,flexShrink:0,borderLeft:'1px solid var(--bd)',background:'var(--pnl)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'12px 14px',borderBottom:'1px solid var(--bd)'}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--t1)'}}>📊 Résultats</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:10,display:'flex',flexDirection:'column',gap:6,minHeight:0}}>

        {/* Surface */}
        <div style={{padding:10,borderRadius:10,background:'var(--crd)',border:'1px solid var(--bd)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--t3)',marginBottom:6}}>SURFACE</div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Surface pièce</span>
            <span style={{fontSize:12,fontWeight:700,color:'#0ea5e9',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.totalRoomArea.toFixed(2)} m²</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Surface carreau</span>
            <span style={{fontSize:11,color:'var(--t3)',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.fullTileArea.toFixed(4)} m²</span>
          </div>
        </div>

        {/* Tiles count */}
        <div style={{padding:10,borderRadius:10,background:'var(--crd)',border:'1px solid var(--bd)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--t3)',marginBottom:6}}>CARREAUX</div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Carreaux entiers</span>
            <span style={{fontSize:12,fontWeight:700,color:'#34d399',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.fullCount}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Carreaux coupés</span>
            <span style={{fontSize:12,fontWeight:700,color:'#f87171',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.cutCount}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Total posé</span>
            <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.totalTilesNeeded}</span>
          </div>
          <div style={{height:1,background:'var(--bd)',margin:'6px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Chutes estimées</span>
            <span style={{fontSize:12,fontWeight:600,color:'#f59e0b',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.wastePercent.toFixed(1)}%</span>
          </div>
        </div>

        {/* Order */}
        <div style={{padding:12,borderRadius:10,background:'linear-gradient(135deg,rgba(14,165,233,.06),rgba(14,165,233,.02))',border:'1px solid rgba(14,165,233,.15)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'#0ea5e9',marginBottom:6}}>À COMMANDER (+10% marge)</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>Carreaux</span>
            <span style={{fontSize:20,fontWeight:800,color:'#0ea5e9',fontFamily:'JetBrains Mono,monospace'}}>{computeTiles.tilesToOrder}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>Surface à acheter</span>
            <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',fontFamily:'JetBrains Mono,monospace'}}>{(computeTiles.tilesToOrder*computeTiles.fullTileArea).toFixed(2)} m²</span>
          </div>
        </div>

        {/* Tile format recap */}
        <div style={{padding:10,borderRadius:10,background:'var(--crd)',border:'1px solid var(--bd)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--t3)',marginBottom:6}}>RÉCAPITULATIF</div>
          <div style={{fontSize:10,color:'var(--t2)',lineHeight:1.7}}>
            <div>Pièce: <b>{roomName}</b> ({roomType})</div>
            <div>Carreau: <b>{orientation==='v'?tileH:tileW}×{orientation==='v'?tileW:tileH} mm</b></div>
            <div>Joint: <b>{jointW} mm</b></div>
            <div>Motif: <b>{PATTERNS.find(p=>p.id===pattern)?.name}</b></div>
            <div>Départ: <b>{CORNERS.find(c=>c.id===startCorner)?.name}</b></div>
          </div>
        </div>

        {/* Cut details */}
        {showCuts&&computeTiles.cutCount>0&&<div style={{padding:10,borderRadius:10,background:'rgba(239,68,68,.04)',border:'1px solid rgba(239,68,68,.1)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'#f87171',marginBottom:6}}>COUPES PÉRIPHÉRIQUES</div>
          <div style={{fontSize:10,color:'var(--t2)',lineHeight:1.7}}>
            {(()=>{
              const tw=orientation==='v'?tileH:tileW;
              const th=orientation==='v'?tileW:tileH;
              const j=jointW;
              const cutRight=roomW%((tw+j))||tw;
              const cutBottom=roomH%((th+j))||th;
              return<>
                <div>Coupe droite: <b style={{color:'#f87171'}}>{Math.round(cutRight)} mm</b></div>
                <div>Coupe basse: <b style={{color:'#f87171'}}>{Math.round(cutBottom)} mm</b></div>
                <div>Nb coupes: <b>{computeTiles.cutCount}</b></div>
              </>;
            })()}
          </div>
        </div>}

        {/* Joint quantity */}
        <div style={{padding:10,borderRadius:10,background:'var(--crd)',border:'1px solid var(--bd)'}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--t3)',marginBottom:6}}>JOINTEMENT</div>
          <div style={{fontSize:10,color:'var(--t2)',lineHeight:1.7}}>
            {(()=>{
              const tw=orientation==='v'?tileH:tileW;
              const th=orientation==='v'?tileW:tileH;
              const perimeter=(tw+th)*2;
              const totalJointLength=computeTiles.totalTilesNeeded*perimeter/2/1000;// ml approx
              const kgPerM2=jointW<=3?0.5:jointW<=5?0.8:1.2;
              const jointKg=computeTiles.totalRoomArea*kgPerM2;
              return<>
                <div>Linéaire joints: <b>~{totalJointLength.toFixed(0)} ml</b></div>
                <div>Mortier joint: <b>~{jointKg.toFixed(1)} kg</b></div>
                <div style={{fontSize:9,color:'var(--t3)',marginTop:2}}>(base {kgPerM2} kg/m² pour joint {jointW}mm)</div>
              </>;
            })()}

        </div>

    {/* ═══ CARRELAGE PLAN DE MASSE ═══ */}

        <div style={{flex:1}}/>

        <button onClick={()=>{const nr=mkRoom('Pièce '+(cRooms.length+1));setCRooms(rs=>[...rs,nr])}} style={{padding:'5px 14px',borderRadius:7,border:'1px solid rgba(14,165,233,.2)',background:'rgba(14,165,233,.06)',color:'#0ea5e9',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ Pièce</button>

        {/* 3D or 2D view */}
        {cMasse3D?<div ref={cMasseRef} style={{flex:1,background:'#ddd4c8',cursor:'grab'}}/>

          {(()=>{
            // Arrange rooms in a grid layout
            const cols=Math.ceil(Math.sqrt(cRooms.length));
            const gap=1;// meters
            let maxW=0,maxH=0;
            cRooms.forEach(r=>{maxW=Math.max(maxW,r.roomW/1000);maxH=Math.max(maxH,r.roomH/1000)});
            const cellW=maxW+gap,cellH=maxH+gap;
            const totalW=cols*cellW,totalH=Math.ceil(cRooms.length/cols)*cellH;
            const pad=1;
            const CARR_COLORS=['#0ea5e9','#c4324a','#d97706','#10b981','#8b5cf6','#ec4899'];
            return<svg viewBox={`${-pad} ${-pad} ${totalW+pad*2} ${totalH+pad*2}`} style={{width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
              <defs><pattern id="c-grid" width="1" height="1" patternUnits="userSpaceOnUse"><rect width="1" height="1" fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth="0.02"/></pattern></defs>
              <rect x={-pad} y={-pad} width={totalW+pad*2} height={totalH+pad*2} fill="url(#c-grid)"/>
              {cRooms.map((rm,i)=>{
                const col=i%cols,row=Math.floor(i/cols);
                const rx=col*cellW,ry=row*cellH;
                const rw=rm.roomW/1000,rh=rm.roomH/1000;
                const clr=CARR_COLORS[i%CARR_COLORS.length];
                return<g key={rm.id}>
                  <rect x={rx} y={ry} width={rw} height={rh} fill={clr} fillOpacity={activeCRoomIdx===i?.3:.1}
                    stroke={clr} strokeWidth={activeCRoomIdx===i?.06:.02} rx={.08}
                    style={{cursor:'pointer'}} onClick={()=>{setActiveCRoomIdx(i);setShowCPlanMasse(false)}}/>
                  <text x={rx+rw/2} y={ry+rh/2-.15} textAnchor="middle" fill={clr} fontSize={Math.min(rw,rh)*.12} fontWeight="700">{rm.name}</text>
                  <text x={rx+rw/2} y={ry+rh/2+.15} textAnchor="middle" fill={clr} fontSize={Math.min(rw,rh)*.08} opacity=".7">{rm.roomW}×{rm.roomH}</text>
                  <text x={rx+rw/2} y={ry+rh/2+.35} textAnchor="middle" fill={clr} fontSize={Math.min(rw,rh)*.07} opacity=".5">{rm.roomType==='piscine'?'🏊 Piscine':rm.roomType==='mur'?'Mur':'Sol'}</text>
                </g>})}
            </svg>
          })()}
        </div>}
        {/* Side panel */}
        <div style={{width:260,borderLeft:'1px solid var(--bd)',background:'var(--pnl)',padding:12,overflowY:'auto',display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--t1)',marginBottom:4}}>Pièces</div>
          {cRooms.map((rm,i)=>{
            const clr=(['#0ea5e9','#c4324a','#d97706','#10b981','#8b5cf6','#ec4899'])[i%6];
            return<div key={rm.id} style={{padding:10,borderRadius:10,border:activeCRoomIdx===i?'1.5px solid '+clr:'1px solid var(--bd)',background:activeCRoomIdx===i?'rgba(14,165,233,.03)':'var(--crd)',cursor:'pointer'}}
              onClick={()=>setActiveCRoomIdx(i)}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <div style={{width:10,height:10,borderRadius:3,background:clr}}/>
                <input value={rm.name} onClick={e=>e.stopPropagation()} onChange={e=>{const v=e.target.value;setCRooms(rs=>rs.map((r,j)=>j===i?{...r,name:v}:r))}}
                  style={{flex:1,fontSize:11,fontWeight:700,color:'var(--t1)',background:'none',border:'none',outline:'none',fontFamily:'inherit',padding:0}}/>
                <span style={{fontSize:9,color:'var(--t3)'}}>{rm.roomW}×{rm.roomH}</span>
              </div>
              <div style={{display:'flex',gap:4,fontSize:9,color:'var(--t3)'}}>
                <span>{rm.roomType==='piscine'?'🏊':'🏠'} {rm.tileW}×{rm.tileH}mm</span>
                <span>j:{rm.jointW}mm</span>
                <span>{(rm.roomW*rm.roomH/1e6).toFixed(1)}m²</span>
              </div>
              {cRooms.length>1&&<button onClick={e=>{e.stopPropagation();if(!confirm('Supprimer '+rm.name+' ?'))return;setCRooms(rs=>rs.filter((_,j)=>j!==i));if(activeCRoomIdx>=cRooms.length-1)setActiveCRoomIdx(Math.max(0,cRooms.length-2))}}
                style={{marginTop:6,padding:'3px 8px',borderRadius:5,border:'1px solid rgba(239,68,68,.2)',background:'rgba(239,68,68,.05)',color:'#ef4444',fontSize:9,cursor:'pointer',fontFamily:'inherit',width:'100%'}}>Supprimer</button>}
            </div>})}
          <button onClick={()=>{const nr=mkRoom('Pièce '+(cRooms.length+1));setCRooms(rs=>[...rs,nr])}}
            style={{padding:10,borderRadius:10,border:'1px dashed rgba(14,165,233,.3)',background:'none',color:'#0ea5e9',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ Ajouter une pièce</button>
        </div>
      </div>
    </div>}
  </div>{/* end carrelage inner flex */}
  </div>;
}

    {id:'grd_corps',cat:'Divers',label:'Garde-corps provisoire / définitif (ml)',unit:'ml',prix:180,auto:null},
    {id:'dalot',cat:'Divers',label:'Dalot de collecte EP',unit:'u',prix:350,auto:null},
  ];
  const CATS=[...new Set(PRESTA_LIB.map(p=>p.cat))];

  // ═══════════════════════════════════════════
  // GÉOMÉTRIE
  // ═══════════════════════════════════════════
  const polyArea=pts=>{let a=0;for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;a+=pts[i][0]*pts[j][1]-pts[j][0]*pts[i][1]}return Math.abs(a/2)};
  const polyPeri=pts=>{let p=0;for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;const dx=pts[j][0]-pts[i][0],dy=pts[j][1]-pts[i][1];p+=Math.sqrt(dx*dx+dy*dy)}return p};
  const polyCtr=pts=>{let cx=0,cy=0;pts.forEach(p=>{cx+=p[0];cy+=p[1]});return[cx/pts.length,cy/pts.length]};
  const polyBnds=pts=>{let mn=[Infinity,Infinity],mx=[-Infinity,-Infinity];pts.forEach(p=>{mn[0]=Math.min(mn[0],p[0]);mn[1]=Math.min(mn[1],p[1]);mx[0]=Math.max(mx[0],p[0]);mx[1]=Math.max(mx[1],p[1])});return{min:mn,max:mx,w:mx[0]-mn[0],h:mx[1]-mn[1]}};
  const r2=v=>Math.round(v*100)/100;
  const r0=v=>Math.round(v);

  const mkZone=(n,i)=>({
    id:Date.now()+Math.random()+i,
    name:n||('Zone '+(i+1)),
    roofPts:[[0,0],[12,0],[12,8],[0,8]],
    edicules:[],lanterneaux:[],eps:[{id:'e1',x:0,y:4},{id:'e2',x:12,y:4}],
    tremies:[],// {id,x,y,w,l} — rectangular openings
    surfManual:null,periManual:null,
    acroH:300,relH:150,couvertW:400,
    support:'bac_acier',// bac_acier | dalle_ba
    pente:1.5,// %
    penteDir:'ew',// ns | ew — slope direction
    complex:'bicouche',// bicouche | mono | pvc | epdm
    prestations:{},
  });

  const [zones,setZones]=useState([mkZone('Toiture principale',0)]);
  const [activeId,setActiveId]=useState(null);
  const [tab,setTab]=useState('plan');
  const [drawMode,setDrawMode]=useState(null);
  const [drawPts,setDrawPts]=useState([]);
  const [dragPt,setDragPt]=useState(null);
  const [selEdic,setSelEdic]=useState(null);
  const [view3D,setView3D]=useState(false);
  const svgRef=useRef(null);
  const mountRef=useRef(null);
  const scRef=useRef({});
  const lastPt=useRef(null);
  const [editZoneName,setEditZoneName]=useState(null);

  const az=zones.find(z=>z.id===activeId)||zones[0];
  const setAz=patch=>setZones(zs=>zs.map(z=>z.id===az.id?{...z,...patch}:z));
  const setPresta=(zid,pid,patch)=>setZones(zs=>zs.map(z=>z.id===zid?{...z,prestations:{...z.prestations,[pid]:{...z.prestations[pid],...patch}}}:z));

  const zStats=z=>{
    const surf=z.surfManual!=null?z.surfManual:polyArea(z.roofPts);
    const peri=z.periManual!=null?z.periManual:polyPeri(z.roofPts);
    const surfEdic=z.edicules.reduce((s,e)=>s+polyArea(e.pts),0);
    const surfLant=z.lanterneaux.reduce((s,l)=>s+l.w*l.l,0);
    const surfTrem=(z.tremies||[]).reduce((s,t)=>s+t.w*t.l,0);
    return{surf,peri,nette:Math.max(0,surf-surfEdic-surfLant-surfTrem),eps:z.eps.length,lants:z.lanterneaux.length+z.edicules.filter(e=>e.hasLant).length,surfEdic,surfLant,surfTrem,trems:(z.tremies||[]).length};
  };

  const lineItem=(z,p)=>{
    const cfg=z.prestations[p.id]||{};
    if(!cfg.enabled)return null;
    const st=zStats(z);
    const autoQ=p.auto?p.auto(st):null;
    const qty=cfg.qtyOverride!=null?cfg.qtyOverride:(autoQ||0);
    const prix=cfg.prixOverride!=null?cfg.prixOverride:p.prix;

  };

  const zoneTotal=z=>PRESTA_LIB.reduce((s,p)=>{const li=lineItem(z,p);return s+(li?li.total:0);},0);
  const grandTotal=zones.reduce((s,z)=>s+zoneTotal(z),0);

  // ═══════════════════════════════════════════
  // SVG INTERACTION
  // ═══════════════════════════════════════════
  const[svgZoom,setSvgZoom]=useState(1);
  const[svgPan,setSvgPan]=useState({x:0,y:0});
  const[panning,setPanning]=useState(false);
  const[panStart,setPanStart]=useState(null);
  const[snapGrid,setSnapGrid]=useState(true);
  const[dimInput,setDimInput]=useState(null);// {idx, value} — edit segment length
  const snap=(v)=>snapGrid?Math.round(v*4)/4:Math.round(v*20)/20;// 0.25m snap
  const svgCoord=e=>{
    const svg=svgRef.current;if(!svg)return[0,0];

    const inv=svg.getScreenCTM()?.inverse();if(!inv)return[0,0];

  };

  const handleMM=e=>{
    if(!dragPt)return;
    const[x,y]=svgCoord(e);
    if(dragPt.type==='roof')setAz({roofPts:az.roofPts.map((p,i)=>i===dragPt.idx?[snap(x),snap(y)]:p)});
    else if(dragPt.type==='lant')setAz({lanterneaux:az.lanterneaux.map((l,i)=>i===dragPt.idx?{...l,x,y}:l)});
    else if(dragPt.type==='lant_r'){setAz({lanterneaux:az.lanterneaux.map((l,i)=>{if(i!==dragPt.idx)return l;return{...l,w:Math.max(.3,Math.abs(x-l.x)*2),l:Math.max(.3,Math.abs(y-l.y)*2)}})});}
    else if(dragPt.type==='ep')setAz({eps:az.eps.map((ep,i)=>i===dragPt.idx?{...ep,x,y}:ep)});
    else if(dragPt.type==='edic_pt')setAz({edicules:az.edicules.map(ed=>ed.id===dragPt.edicId?{...ed,pts:ed.pts.map((p,i)=>i===dragPt.idx?[snap(x),snap(y)]:p)}:ed)});
    else if(dragPt.type==='edic_mv'){
      if(!lastPt.current)lastPt.current=[x,y];
      const dx=x-lastPt.current[0],dy=y-lastPt.current[1];lastPt.current=[x,y];

    }
    else if(dragPt.type==='trem')setAz({tremies:(az.tremies||[]).map((t,i)=>i===dragPt.idx?{...t,x,y}:t)});
    else if(dragPt.type==='trem_r')setAz({tremies:(az.tremies||[]).map((t,i)=>{if(i!==dragPt.idx)return t;return{...t,w:Math.max(.3,Math.abs(x-t.x)*2),l:Math.max(.3,Math.abs(y-t.y)*2)}})});
  };
  const handleMU=()=>{setDragPt(null);lastPt.current=null;};
  const handleClick=e=>{
    if(!drawMode)return;
    const[x,y]=svgCoord(e);
    const np=[...drawPts,[snap(x),snap(y)]];
    const close=np.length>=3&&Math.hypot(np[0][0]-x,np[0][1]-y)<.8;
    if(drawMode==='roof'){
      if(close){setAz({roofPts:np.slice(0,-1)});setDrawMode(null);setDrawPts([]);}
      else setDrawPts(np);
    } else if(drawMode==='edic'){
      if(close){
        const id=Date.now();
        setAz({edicules:[...az.edicules,{id,name:'Édicule '+(az.edicules.length+1),pts:np.slice(0,-1),h:2500,type:'ventelles',hasLant:false,lantW:1200,lantL:1200}]});
        setDrawMode(null);setDrawPts([]);
      } else setDrawPts(np);
    } else if(drawMode==='tremie'){
      // Tremie: 2 clicks = rectangle
      if(np.length>=2){
        const[x1,y1]=np[0],[x2,y2]=np[1];
        const tw=Math.abs(x2-x1),tl=Math.abs(y2-y1);
        if(tw>.1&&tl>.1){
          const id=Date.now();
          setAz({tremies:[...(az.tremies||[]),{id,x:Math.min(x1,x2)+tw/2,y:Math.min(y1,y2)+tl/2,w:tw,l:tl}]});
        }
        setDrawMode(null);setDrawPts([]);
      } else setDrawPts(np);
    }
  };
  const handleDbl=()=>{
    if(drawMode==='roof'&&drawPts.length>=3){setAz({roofPts:drawPts});setDrawMode(null);setDrawPts([]);}
    else if(drawMode==='edic'&&drawPts.length>=3){
      const id=Date.now();
      setAz({edicules:[...az.edicules,{id,name:'Édicule '+(az.edicules.length+1),pts:drawPts,h:2500,type:'ventelles',hasLant:false,lantW:1200,lantL:1200}]});
      setDrawMode(null);setDrawPts([]);
    }
  };

  // ═══════════════════════════════════════════
  // 3D
  // ═══════════════════════════════════════════
  useEffect(()=>{
    if(!view3D||!mountRef.current)return;
    const el=mountRef.current;const W=el.clientWidth,H=el.clientHeight;if(W<10)return;
    if(scRef.current.renderer)scRef.current.renderer.dispose();el.innerHTML='';
    const scene=new THREE.Scene();scene.background=new THREE.Color(0xddd4c8);
    scene.fog=new THREE.FogExp2(0xddd4c8,.005);
    const cam=new THREE.PerspectiveCamera(42,W/H,.01,300);
    const rend=new THREE.WebGLRenderer({antialias:true});
    rend.setSize(W,H);rend.setPixelRatio(Math.min(devicePixelRatio,2));
    rend.shadowMap.enabled=true;rend.shadowMap.type=THREE.PCFSoftShadowMap;rend.toneMapping=THREE.ACESFilmicToneMapping;rend.toneMappingExposure=1.12;
    el.appendChild(rend.domElement);rend.domElement.style.cursor='grab';
    scene.add(new THREE.AmbientLight(0xffe8d8,.35));scene.add(new THREE.HemisphereLight(0xc8dcff,0xc8b8a0,.4));
    const sun=new THREE.DirectionalLight(0xfff5e8,1.1);sun.position.set(20,30,15);sun.castShadow=true;sun.shadow.mapSize.set(4096,4096);scene.add(sun);
    const skyL=new THREE.DirectionalLight(0xc8dcff,.25);skyL.position.set(-15,20,-10);scene.add(skyL);
    const flr=new THREE.Mesh(new THREE.PlaneGeometry(150,150),new THREE.MeshPhongMaterial({color:0xc8b8a0}));
    flr.rotation.x=-Math.PI/2;flr.receiveShadow=true;scene.add(flr);
    const gr=new THREE.GridHelper(150,30,0xa89880,0xb8aa98);gr.position.y=.003;scene.add(gr);

    // ── Draw all zones, chacune dans un groupe pour que la pente s'applique correctement ──
    const ROOF_Y=3;const slabH=.15;
    let offsetX=0;
    zones.forEach(z=>{
      const ct=polyCtr(z.roofPts);
      const penteRad=Math.atan((z.pente||0)/100);
      const penteDir=z.penteDir||'ew';
      const zComplex=z.complex||'bicouche';
      const memCol=zComplex==='pvc'?0xc8c8c8:zComplex==='epdm'?0x2a2a2a:zComplex==='mono'?0x444440:0x3a3a38;

      // ── Groupe zone : position + pente (tilt autour de l'axe correct) ──
      // La pente doit incliner la dalle, pas la faire tourner.
      // On utilise un groupe parent pour la position et la pente,
      // et on ne met que rotation.x=-PI/2 sur les meshes (pour aplatir la forme extrudée).
      const zG=new THREE.Group();
      zG.position.set(offsetX,ROOF_Y,0);
      // Appliquer la pente sur le groupe : rotation autour de Z (EW) ou X (NS)
      // IMPORTANT : cet axe est dans le repère du groupe AVANT rotation.x=-PI/2 des meshes
      // → rotation.z du groupe = inclinaison EW correcte en monde
      if(penteRad>0.001){
        if(penteDir==='ew') zG.rotation.z=penteRad;
        else zG.rotation.x=penteRad;
      }
      scene.add(zG);

      // Coordonnées locales relatives à ct (sans offsetX — c'est le groupe qui positionne)
      const lx=p=>p[0]-ct[0];
      const lz=p=>p[1]-ct[1];

      // Shape principale (trous : édicules, lanterneaux, trémies)
      const shape=new THREE.Shape();
      z.roofPts.forEach((p,i)=>{const sx=lx(p),sy=-lz(p);i===0?shape.moveTo(sx,sy):shape.lineTo(sx,sy)});
      shape.closePath();
      z.edicules.forEach(ed=>{const h=new THREE.Path();ed.pts.forEach((p,i)=>{const hx=lx(p),hy=-lz(p);i===0?h.moveTo(hx,hy):h.lineTo(hx,hy)});h.closePath();shape.holes.push(h)});
      z.lanterneaux.forEach(la=>{const h=new THREE.Path();const hx=la.x-ct[0],hy=-(la.y-ct[1]);h.moveTo(hx-la.w/2,hy-la.l/2);h.lineTo(hx+la.w/2,hy-la.l/2);h.lineTo(hx+la.w/2,hy+la.l/2);h.lineTo(hx-la.w/2,hy+la.l/2);h.closePath();shape.holes.push(h)});
      (z.tremies||[]).forEach(tr=>{const h=new THREE.Path();const hx=tr.x-ct[0],hy=-(tr.y-ct[1]);h.moveTo(hx-tr.w/2,hy-tr.l/2);h.lineTo(hx+tr.w/2,hy-tr.l/2);h.lineTo(hx+tr.w/2,hy+tr.l/2);h.lineTo(hx-tr.w/2,hy+tr.l/2);h.closePath();shape.holes.push(h)});

      // ── Dalle béton ──
      const slabGeo=new THREE.ExtrudeGeometry(shape,{depth:slabH,bevelEnabled:false});
      const slab=new THREE.Mesh(slabGeo,new THREE.MeshPhongMaterial({color:0x666660,shininess:8,specular:0x111111}));
      slab.rotation.x=-Math.PI/2;slab.castShadow=true;slab.receiveShadow=true;zG.add(slab);

      // ── Membrane d'étanchéité ──
      const memMesh=new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:.015,bevelEnabled:false}),
        new THREE.MeshPhongMaterial({color:memCol,shininess:zComplex==='pvc'?50:10,specular:zComplex==='pvc'?0x333333:0x111111}));
      memMesh.rotation.x=-Math.PI/2;memMesh.position.y=slabH;zG.add(memMesh);

      // ── Acrotères + couvertines ──
      const acH=z.acroH/1000;const acT=.18;
      const acMat=new THREE.MeshPhongMaterial({color:0xc8c0b0,shininess:12,specular:0x201810});
      const cvMat=new THREE.MeshPhongMaterial({color:0xb0b8c0,shininess:60,specular:0x444444});
      for(let ei=0;ei<z.roofPts.length;ei++){
        const ej=(ei+1)%z.roofPts.length;
        const ax=lx(z.roofPts[ei]),az2=lz(z.roofPts[ei]);
        const bx=lx(z.roofPts[ej]),bz=lz(z.roofPts[ej]);
        const dx=bx-ax,dz=bz-az2,len=Math.sqrt(dx*dx+dz*dz);if(len<.01)continue;
        const mx=(ax+bx)/2,mz=(az2+bz)/2;const ang=Math.atan2(dz,dx);
        const aw=new THREE.Mesh(new THREE.BoxGeometry(len+acT,acH,acT),acMat);
        aw.position.set(mx,slabH+acH/2,-mz);aw.rotation.y=-ang;aw.castShadow=true;zG.add(aw);
        const cv=new THREE.Mesh(new THREE.BoxGeometry(len+acT+.06,.018,(z.couvertW||400)/1000),cvMat);
        cv.position.set(mx,slabH+acH+.009,-mz);cv.rotation.y=-ang;zG.add(cv);
      }

      // ── Relevés d'étanchéité ──
      const relHm=(z.relH||150)/1000;
      const relMat=new THREE.MeshPhongMaterial({color:memCol,shininess:5,specular:0x080808});
      for(let ei=0;ei<z.roofPts.length;ei++){
        const ej=(ei+1)%z.roofPts.length;
        const ax=lx(z.roofPts[ei]),az2=lz(z.roofPts[ei]);
        const bx=lx(z.roofPts[ej]),bz=lz(z.roofPts[ej]);
        const dx=bx-ax,dz=bz-az2,len=Math.sqrt(dx*dx+dz*dz);if(len<.01)continue;
        const relBand=new THREE.Mesh(new THREE.BoxGeometry(len,relHm,.008),relMat);
        relBand.position.set((ax+bx)/2,slabH+relHm/2,-((az2+bz)/2));relBand.rotation.y=-Math.atan2(dz,dx);zG.add(relBand);
      }

      // ── Édicules (ventelles ou parois pleines) ──
      z.edicules.forEach(ed=>{
        const eH=ed.h/1000;
        for(let ei=0;ei<ed.pts.length;ei++){
          const ej=(ei+1)%ed.pts.length;
          const ax=lx(ed.pts[ei]),az2=lz(ed.pts[ei]);
          const bx=lx(ed.pts[ej]),bz=lz(ed.pts[ej]);
          const dx=bx-ax,dz=bz-az2,len=Math.sqrt(dx*dx+dz*dz);if(len<.01)continue;
          const mx=(ax+bx)/2,mz=(az2+bz)/2;const ang=Math.atan2(dz,dx);
          if(ed.type==='ventelles'){
            const nS=Math.max(3,Math.floor(eH/.12));
            const slatMat=new THREE.MeshPhongMaterial({color:0x555555,shininess:50});
            for(let s=0;s<nS;s++){const sl=new THREE.Mesh(new THREE.BoxGeometry(len,.03,.05),slatMat);sl.position.set(mx,slabH+.05+s*(eH/nS),-mz);sl.rotation.y=-ang;zG.add(sl);}
            [ed.pts[ei],ed.pts[ej]].forEach(pp=>{const post=new THREE.Mesh(new THREE.BoxGeometry(.05,eH,.05),new THREE.MeshPhongMaterial({color:0x333333}));post.position.set(lx(pp),slabH+eH/2,-lz(pp));zG.add(post);});
          } else {
            const ww=new THREE.Mesh(new THREE.BoxGeometry(len,eH,.06),new THREE.MeshPhongMaterial({color:0x7a7a80,shininess:20}));
            ww.position.set(mx,slabH+eH/2,-mz);ww.rotation.y=-ang;zG.add(ww);
          }
        }
        const eShape=new THREE.Shape();
        ed.pts.forEach((p,i)=>{i===0?eShape.moveTo(lx(p),-lz(p)):eShape.lineTo(lx(p),-lz(p))});eShape.closePath();
        const erMesh=new THREE.Mesh(new THREE.ExtrudeGeometry(eShape,{depth:.06,bevelEnabled:false}),new THREE.MeshPhongMaterial({color:0x555555}));
        erMesh.rotation.x=-Math.PI/2;erMesh.position.y=slabH+ed.h/1000;zG.add(erMesh);
        if(ed.hasLant){const ec=polyCtr(ed.pts);
          const gl=new THREE.Mesh(new THREE.BoxGeometry(ed.lantW/1000,.06,ed.lantL/1000),new THREE.MeshPhongMaterial({color:0x88bbdd,transparent:true,opacity:.45,shininess:120}));
          gl.position.set(lx(ec),slabH+ed.h/1000+.08,-lz(ec));zG.add(gl);}
      });

      // ── Lanterneaux ──
      z.lanterneaux.forEach(la=>{
        const lxv=la.x-ct[0],lzv=la.y-ct[1];const curbH=.12;
        const curbMat=new THREE.MeshPhongMaterial({color:0x888888});
        [[lxv,-(lzv-la.l/2),la.w+.08,.04],[lxv,-(lzv+la.l/2),la.w+.08,.04],
         [lxv-la.w/2,-lzv,.04,la.l],[lxv+la.w/2,-lzv,.04,la.l]].forEach(([fx,fz,fw,fd])=>{
          const f=new THREE.Mesh(new THREE.BoxGeometry(fw,curbH,fd),curbMat);f.position.set(fx,slabH+curbH/2,fz);zG.add(f)});
        const gl=new THREE.Mesh(new THREE.BoxGeometry(la.w,.05,la.l),new THREE.MeshPhongMaterial({color:0x88c0e8,transparent:true,opacity:.35,shininess:150}));
        gl.position.set(lxv,slabH+curbH+.025,-lzv);zG.add(gl);
      });

      // ── Bac acier (sous la dalle) ──
      if(z.support==='bac_acier'){
        const bn=polyBnds(z.roofPts);const nervStep=.6;const nNerv=Math.ceil(bn.w/nervStep);
        const bacMat=new THREE.MeshPhongMaterial({color:0xb0b8c0,shininess:40});
        for(let ni=0;ni<=nNerv;ni++){
          const nx=bn.min[0]+ni*nervStep-ct[0];
          const nerv=new THREE.Mesh(new THREE.BoxGeometry(.015,.06,bn.h+.1),bacMat);
          nerv.position.set(nx,-.05,-(bn.min[1]+bn.h/2-ct[1]));zG.add(nerv);}
        const bp=new THREE.Mesh(new THREE.BoxGeometry(bn.w+.2,.008,bn.h+.2),new THREE.MeshPhongMaterial({color:0xa0a8b0}));
        bp.position.set(bn.min[0]+bn.w/2-ct[0],-.08,-(bn.min[1]+bn.h/2-ct[1]));zG.add(bp);
      }

      // ── Costières de trémies ──
      (z.tremies||[]).forEach(tr=>{
        const tx=tr.x-ct[0],tz=tr.y-ct[1];const costH=.12;
        const costMat=new THREE.MeshPhongMaterial({color:0x666660});
        [[tx,-(tz-tr.l/2),tr.w+.06,.04],[tx,-(tz+tr.l/2),tr.w+.06,.04],
         [tx-tr.w/2,-tz,.04,tr.l],[tx+tr.w/2,-tz,.04,tr.l]].forEach(([fx,fz,fw,fd])=>{
          const f=new THREE.Mesh(new THREE.BoxGeometry(fw,costH,fd),costMat);f.position.set(fx,slabH+costH/2,fz);zG.add(f)});
      });

      // ── EP — dans la scène principale (tubes verticaux, pas inclinés avec la toiture) ──
      z.eps.forEach(ep=>{
        const px=ep.x-ct[0]+offsetX,pz=ep.y-ct[1];
        const pipe=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,ROOF_Y+.3,8),new THREE.MeshPhongMaterial({color:0x505050,shininess:30}));
        pipe.position.set(px,(ROOF_Y+.3)/2,-pz);pipe.castShadow=true;scene.add(pipe);
        const collar=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.03,8),new THREE.MeshPhongMaterial({color:0x333333}));
        collar.position.set(px,ROOF_Y+slabH+.015,-pz);scene.add(collar);
      });

      // ── Poteaux de structure ──
      const pilMat=new THREE.MeshPhongMaterial({color:0x888880});
      z.roofPts.forEach((p,pi)=>{
        if(pi%Math.max(1,Math.floor(z.roofPts.length/4))===0){
          const pil=new THREE.Mesh(new THREE.BoxGeometry(.3,ROOF_Y,.3),pilMat);
          pil.position.set(lx(p)+offsetX,ROOF_Y/2,-lz(p));pil.castShadow=true;scene.add(pil);
        }
      });

      const bnds2=polyBnds(z.roofPts);
      offsetX+=bnds2.w+5;
    });

    // Camera
    const tgt=new THREE.Vector3(offsetX/2-3,3,0);
    const rot={x:-.5,y:.4};const zm={v:25};const pan={x:0,y:0};
    let dr=null;
    const onD=e=>{dr={x:e.clientX,y:e.clientY,rx:rot.x,ry:rot.y,btn:e.button}};
    const onU=()=>{dr=null};
    const onM=e=>{if(!dr)return;if(dr.btn===2||dr.btn===1){pan.x+=(e.clientX-dr.x)*.005;pan.y-=(e.clientY-dr.y)*.005;dr.x=e.clientX;dr.y=e.clientY;}else{rot.y=dr.ry+(e.clientX-dr.x)*.005;rot.x=Math.max(-1.4,Math.min(.2,dr.rx+(e.clientY-dr.y)*.005))}};
    const onW=e=>{e.preventDefault();zm.v=Math.max(3,Math.min(100,zm.v*(1+e.deltaY*.001)))};
    rend.domElement.addEventListener('mousedown',onD);rend.domElement.addEventListener('mouseup',onU);
    rend.domElement.addEventListener('mouseleave',onU);rend.domElement.addEventListener('mousemove',onM);
    rend.domElement.addEventListener('wheel',onW,{passive:false});rend.domElement.addEventListener('contextmenu',e=>e.preventDefault());
    let raf;const anim=()=>{raf=requestAnimationFrame(anim);cam.position.set(tgt.x+zm.v*Math.sin(rot.y)*Math.cos(rot.x)+pan.x,tgt.y+zm.v*Math.sin(-rot.x)+pan.y,tgt.z+zm.v*Math.cos(rot.y)*Math.cos(rot.x));cam.lookAt(tgt.x+pan.x,tgt.y+pan.y,tgt.z);rend.render(scene,cam)};anim();
    scRef.current={renderer:rend,raf};
    return()=>{cancelAnimationFrame(raf);rend.dispose();el.innerHTML='';scRef.current={}};
  },[view3D,zones]);

  // ═══════════════════════════════════════════
  // UI HELPERS
  // ═══════════════════════════════════════════
  const InputN=({label,value,onChange,unit,min=0,max=99999,step=1,small})=><div style={{marginBottom:small?3:5}}>
    {label&&<div style={{fontSize:8,fontWeight:600,color:'var(--t2)',marginBottom:2,display:'flex',justifyContent:'space-between'}}><span>{label}</span><span style={{color:'var(--t3)'}}>{unit}</span></div>}
    <input type="number" value={value} min={min} max={max} step={step} onChange={e=>onChange(Number(e.target.value))}
      onKeyDown={e=>e.stopPropagation()}
      style={{width:'100%',padding:small?'3px 5px':'4px 7px',borderRadius:6,border:'1.5px solid var(--bd)',background:'var(--inp)',color:'var(--t1)',fontSize:11,fontFamily:'JetBrains Mono,monospace',fontWeight:700,textAlign:'right',outline:'none',boxSizing:'border-box'}}/>
  </div>;

  const st=zStats(az);
  const bnd=polyBnds(az.roofPts.length>=3?az.roofPts:[[0,0],[10,0],[10,8],[0,8]]);
  const pad=3;
  const vbW=(bnd.w+pad*2)/svgZoom,vbH=(bnd.h+pad*2)/svgZoom;
  const vbX=bnd.min[0]-pad+(bnd.w+pad*2)*(1-1/svgZoom)/2+svgPan.x;
  const vbY=bnd.min[1]-pad+(bnd.h+pad*2)*(1-1/svgZoom)/2+svgPan.y;
  const vb=`${vbX} ${vbY} ${vbW} ${vbH}`;

  // ═══════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════
  return<div style={{display:'flex',flexDirection:'column',width:'100%',height:'100%',minHeight:0,background:'var(--bg)',fontFamily:'DM Sans,system-ui,sans-serif'}}>
    {/* ── HEADER UNIFIÉ ── */}
    <div style={{height:44,flexShrink:0,display:'flex',alignItems:'center',padding:'0 14px',gap:10,borderBottom:'1px solid var(--bd)',background:'var(--pnl)'}}>
      {/* Logo / retour */}
      <div onClick={onBack} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:7,padding:'4px 8px',borderRadius:7,transition:'background .12s',flexShrink:0}}
        onMouseOver={e=>e.currentTarget.style.background='rgba(42,14,20,.06)'}
        onMouseOut={e=>e.currentTarget.style.background='transparent'}>
        <div style={{width:26,height:26,borderRadius:7,background:'linear-gradient(135deg,#c4324a,#a0243a)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="12" height="12" viewBox="0 0 40 40" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="#fff" strokeWidth="3"/><rect x="23" y="3" width="14" height="14" rx="2" stroke="#fff" strokeWidth="3"/><rect x="3" y="23" width="14" height="14" rx="2" stroke="#fff" strokeWidth="3"/><rect x="23" y="23" width="14" height="14" rx="2" stroke="#fff" strokeWidth="3"/></svg>
        </div>
        <span style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>Kalepin</span>
      </div>
      <svg width="6" height="10" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="var(--bd)" strokeWidth="1.5" strokeLinecap="round"/></svg>
      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
        <div style={{width:22,height:22,borderRadius:6,background:'linear-gradient(135deg,#7e4faa,#5a3080)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>🏗</div>
        <span style={{fontSize:12,fontWeight:700,color:'#7e4faa'}}>Étanchéité</span>
      </div>
      <svg width="6" height="10" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="var(--bd)" strokeWidth="1.5" strokeLinecap="round"/></svg>
      {/* Zone tabs */}
      <div style={{display:'flex',gap:3,alignItems:'center',flex:1,overflowX:'auto',minWidth:0}}>
        {zones.map((z)=><button key={z.id} onClick={()=>{setActiveId(z.id);setSelEdic(null);}}
          style={{padding:'3px 10px',borderRadius:6,border:'1.5px solid '+(az.id===z.id?'rgba(126,79,170,.45)':'var(--bd)'),
            background:az.id===z.id?'rgba(126,79,170,.1)':'transparent',color:az.id===z.id?'#7e4faa':'var(--t3)',
            fontSize:10,fontWeight:az.id===z.id?700:500,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>
          {z.name}<span style={{opacity:.45,fontWeight:400,marginLeft:4}}>{r2(zStats(z).nette)}m²</span>
        </button>)}
        <button onClick={()=>{const z=mkZone(null,zones.length);setZones(zs=>[...zs,z]);setActiveId(z.id);}}
          style={{padding:'3px 9px',borderRadius:6,border:'1px dashed rgba(126,79,170,.3)',background:'none',color:'#7e4faa',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>+ Zone</button>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',gap:2,background:'rgba(42,14,20,.05)',borderRadius:8,padding:2,flexShrink:0}}>
        {[['plan','📐 Plan'],['presta','✅ Prestations'],['devis','📋 Devis']].map(([k,l])=>
          <button key={k} onClick={()=>setTab(k)} style={{padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:700,border:'none',cursor:'pointer',fontFamily:'inherit',
            background:tab===k?'rgba(126,79,170,.18)':'transparent',color:tab===k?'#7e4faa':'var(--t2)',transition:'all .12s'}}>{l}</button>)}
      </div>
      <button onClick={()=>setView3D(v=>!v)} style={{padding:'4px 11px',borderRadius:6,border:'1px solid '+(view3D?'rgba(126,79,170,.4)':'var(--bd)'),background:view3D?'rgba(126,79,170,.1)':'transparent',color:'#7e4faa',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0,transition:'all .12s'}}>{view3D?'↩ 2D':'🧊 3D'}</button>
    </div>

    <div style={{display:'flex',flex:1,minHeight:0}}>

      {/* ── PANNEAU GAUCHE ── */}
      <div style={{width:220,flexShrink:0,borderRight:'1px solid var(--bd)',background:'var(--pnl)',overflowY:'auto',padding:8}}>

        {/* Zone name + delete */}
        <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:8}}>
          {editZoneName===az.id
            ?<input autoFocus value={az.name} onChange={e=>setAz({name:e.target.value})} onBlur={()=>setEditZoneName(null)} onKeyDown={e=>{e.stopPropagation();if(e.key==='Enter')setEditZoneName(null)}}
              style={{flex:1,padding:'3px 7px',borderRadius:6,border:'1.5px solid rgba(126,79,170,.4)',background:'var(--inp)',color:'var(--t1)',fontSize:11,fontWeight:700,outline:'none'}}/>
            :<div onClick={()=>setEditZoneName(az.id)} style={{flex:1,fontSize:11,fontWeight:800,color:'var(--t1)',cursor:'text',padding:'3px 4px',borderRadius:5,border:'1px solid transparent'}}

          {zones.length>1&&<button onClick={()=>{const ni=zones.findIndex(z=>z.id!==az.id);setZones(zs=>zs.filter(z=>z.id!==az.id));setActiveId(zones[ni]?.id||null)}}
            style={{color:'#ef4444',fontSize:10,cursor:'pointer',padding:'2px 5px',borderRadius:4,border:'1px solid rgba(239,68,68,.2)',background:'rgba(239,68,68,.05)',fontFamily:'inherit'}}>✕</button>}
        </div>

        {/* Dimensions + Métrés */}
        <div style={{padding:7,borderRadius:9,border:'1px solid rgba(126,79,170,.15)',background:'rgba(126,79,170,.04)',marginBottom:6}}>

          {/* Quick L×l → rectangle */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>

            <InputN label="Largeur" value={r2(bnd.h)} onChange={v=>{if(v>0){const mn=bnd.min;setAz({roofPts:[[mn[0],mn[1]],[mn[0]+bnd.w,mn[1]],[mn[0]+bnd.w,mn[1]+v],[mn[0],mn[1]+v]]})}}} unit="m" step={0.25} small/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:4}}>
            <InputN label="Surface" value={az.surfManual??r2(st.surf)} onChange={v=>setAz({surfManual:v>0?v:null})} unit="m²" step={0.1} small/>
            <InputN label="Périmètre" value={az.periManual??r2(st.peri)} onChange={v=>setAz({periManual:v>0?v:null})} unit="ml" step={0.1} small/>

          <div style={{fontSize:7.5,color:'var(--t3)',lineHeight:1.8}}>

            <b style={{color:'#7e4faa',fontSize:9}}>Nette: {r2(st.nette)} m²</b> · Péri: <b>{r2(st.peri)} ml</b>
          </div>
          {(az.surfManual!=null||az.periManual!=null)&&<button onClick={()=>setAz({surfManual:null,periManual:null})}
            style={{marginTop:3,width:'100%',padding:'2px',borderRadius:4,border:'1px dashed var(--bd)',background:'none',color:'var(--t3)',fontSize:7,cursor:'pointer',fontFamily:'inherit'}}>↩ Auto depuis tracé</button>}
        </div>

        {/* Complexe */}
        <div style={{padding:7,borderRadius:9,border:'1px solid var(--bd)',marginBottom:6}}>
          <div style={{fontSize:8,fontWeight:700,color:'var(--t1)',marginBottom:5}}>🔧 Paramètres</div>
          {/* Support type */}
          <div style={{fontSize:7,fontWeight:600,color:'var(--t2)',marginBottom:3}}>Support</div>
          <div style={{display:'flex',gap:2,marginBottom:5}}>
            {[{id:'bac_acier',l:'Bac acier'},{id:'dalle_ba',l:'Dalle BA'}].map(t=>
              <button key={t.id} onClick={()=>setAz({support:t.id})}
                style={{flex:1,padding:'3px',fontSize:7.5,fontWeight:700,borderRadius:5,border:'1.5px solid '+((az.support||'bac_acier')===t.id?'rgba(126,79,170,.4)':'var(--bd)'),
                  background:(az.support||'bac_acier')===t.id?'rgba(126,79,170,.1)':'var(--inp)',color:(az.support||'bac_acier')===t.id?'#7e4faa':'var(--t2)',cursor:'pointer',fontFamily:'inherit'}}>{t.l}</button>)}
          </div>
          {/* Complexe type */}
          <div style={{fontSize:7,fontWeight:600,color:'var(--t2)',marginBottom:3}}>Complexe</div>
          <div style={{display:'flex',gap:2,marginBottom:5}}>
            {[{id:'bicouche',l:'Bic.'},{id:'mono',l:'Mono'},{id:'pvc',l:'PVC'},{id:'epdm',l:'EPDM'}].map(t=>
              <button key={t.id} onClick={()=>setAz({complex:t.id})}
                style={{flex:1,padding:'3px',fontSize:7,fontWeight:700,borderRadius:5,border:'1.5px solid '+((az.complex||'bicouche')===t.id?'rgba(14,146,104,.4)':'var(--bd)'),
                  background:(az.complex||'bicouche')===t.id?'rgba(14,146,104,.1)':'var(--inp)',color:(az.complex||'bicouche')===t.id?'#0e9268':'var(--t2)',cursor:'pointer',fontFamily:'inherit'}}>{t.l}</button>)}
          </div>
          {/* Pente */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginBottom:5}}>
            <InputN label="Pente" value={az.pente||1.5} onChange={v=>setAz({pente:v})} unit="%" step={0.5} min={0} max={5} small/>
            <div><div style={{fontSize:7,fontWeight:600,color:'var(--t2)',marginBottom:2}}>Direction</div>
              <div style={{display:'flex',gap:2}}>
                {[{id:'ew',l:'↔'},{id:'ns',l:'↕'}].map(t=>
                  <button key={t.id} onClick={()=>setAz({penteDir:t.id})}
                    style={{flex:1,padding:'3px',fontSize:10,fontWeight:700,borderRadius:4,border:'1px solid '+((az.penteDir||'ew')===t.id?'rgba(126,79,170,.3)':'var(--bd)'),
                      background:(az.penteDir||'ew')===t.id?'rgba(126,79,170,.08)':'var(--inp)',cursor:'pointer'}}>{t.l}</button>)}
              </div>
            </div>
          </div>
          <InputN label="H acrotère" value={az.acroH} onChange={v=>setAz({acroH:v})} unit="mm" min={100} max={1200}/>
          <InputN label="H relevé" value={az.relH} onChange={v=>setAz({relH:v})} unit="mm" min={100} max={500}/>
          <InputN label="Dév. couvertine" value={az.couvertW} onChange={v=>setAz({couvertW:v})} unit="mm" min={200} max={800}/>
        </div>
        {/* Trémies */}
        <div style={{padding:7,borderRadius:9,border:'1px solid rgba(239,68,68,.12)',background:'rgba(239,68,68,.02)',marginBottom:6}}>
          <div style={{fontSize:8,fontWeight:700,color:'#ef4444',marginBottom:5}}>🔲 Trémies ({(az.tremies||[]).length})</div>
          {(az.tremies||[]).map((tr,i)=><div key={tr.id} style={{padding:4,borderRadius:6,border:'1px solid rgba(239,68,68,.15)',background:'rgba(239,68,68,.03)',marginBottom:3}}>
            <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:3}}>
              <span style={{fontSize:8,fontWeight:700,color:'#ef4444'}}>T{i+1}</span>
              <span style={{fontSize:7,color:'var(--t3)',flex:1}}>{r2(tr.w*tr.l)} m²</span>
              <button onClick={()=>setAz({tremies:(az.tremies||[]).filter(t=>t.id!==tr.id)})} style={{fontSize:8,color:'#ef4444',cursor:'pointer',background:'none',border:'none',fontFamily:'inherit'}}>✕</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3}}>
              <InputN label="Longueur" value={tr.w} onChange={v=>setAz({tremies:(az.tremies||[]).map(t=>t.id===tr.id?{...t,w:v}:t)})} unit="m" step={0.1} min={0.2} small/>
              <InputN label="Largeur" value={tr.l} onChange={v=>setAz({tremies:(az.tremies||[]).map(t=>t.id===tr.id?{...t,l:v}:t)})} unit="m" step={0.1} min={0.2} small/>
            </div>
          </div>)}
          <button onClick={()=>{const ct2=polyCtr(az.roofPts);setAz({tremies:[...(az.tremies||[]),{id:Date.now(),x:ct2[0],y:ct2[1],w:1,l:1}]})}}
            style={{width:'100%',padding:4,borderRadius:5,border:'1px dashed rgba(239,68,68,.2)',background:'none',color:'#ef4444',fontSize:7.5,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ Ajouter trémie</button>
        </div>

        {/* Édicules */}
        <div style={{padding:7,borderRadius:9,border:'1px solid rgba(14,146,104,.15)',background:'rgba(14,146,104,.03)',marginBottom:6}}>
          <div style={{fontSize:8,fontWeight:700,color:'#0e9268',marginBottom:5}}>🏢 Édicules ({az.edicules.length})</div>
          {az.edicules.map(ed=><div key={ed.id} style={{padding:5,borderRadius:6,border:'1px solid '+(selEdic===ed.id?'rgba(14,146,104,.35)':'var(--bd)'),background:selEdic===ed.id?'rgba(14,146,104,.06)':'var(--crd)',marginBottom:3,cursor:'pointer'}}
            onClick={()=>setSelEdic(ed.id===selEdic?null:ed.id)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:8,fontWeight:700,color:'var(--t1)'}}>{ed.name}</span>
              <button onClick={e=>{e.stopPropagation();setAz({edicules:az.edicules.filter(x=>x.id!==ed.id)});if(selEdic===ed.id)setSelEdic(null)}}
                style={{fontSize:8,color:'#ef4444',cursor:'pointer',background:'none',border:'none',fontFamily:'inherit'}}>✕</button>
            </div>
            {selEdic===ed.id&&<div style={{marginTop:4}}>
              <InputN label="Hauteur" value={ed.h} onChange={v=>setAz({edicules:az.edicules.map(x=>x.id===ed.id?{...x,h:v}:x)})} unit="mm" min={500} max={6000} small/>
              <label style={{display:'flex',alignItems:'center',gap:4,fontSize:7.5,color:'var(--t2)',cursor:'pointer',marginTop:3}}>
                <input type="checkbox" checked={ed.hasLant} onChange={e=>setAz({edicules:az.edicules.map(x=>x.id===ed.id?{...x,hasLant:e.target.checked}:x)})}/> Lanterneau sur édicule</label>
              {ed.hasLant&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,marginTop:3}}>
                <InputN label="L (mm)" value={ed.lantW} onChange={v=>setAz({edicules:az.edicules.map(x=>x.id===ed.id?{...x,lantW:v}:x)})} small/>
                <InputN label="l (mm)" value={ed.lantL} onChange={v=>setAz({edicules:az.edicules.map(x=>x.id===ed.id?{...x,lantL:v}:x)})} small/>
              </div>}
              <div style={{fontSize:7,color:'var(--t3)',marginTop:2}}>{r2(polyArea(ed.pts))} m² · {r2(polyPeri(ed.pts))} ml</div>
            </div>}
          </div>)}
          <div style={{display:'flex',gap:3,marginTop:2}}>
            <button onClick={()=>{const c=polyCtr(az.roofPts);const id=Date.now();setAz({edicules:[...az.edicules,{id,name:'Édicule '+(az.edicules.length+1),pts:[[c[0]-2,c[1]-1.5],[c[0]+2,c[1]-1.5],[c[0]+2,c[1]+1.5],[c[0]-2,c[1]+1.5]],h:2500,type:'ventelles',hasLant:false,lantW:1200,lantL:1200}]})}}
              style={{flex:1,padding:'4px',borderRadius:5,border:'1px dashed rgba(14,146,104,.3)',background:'none',color:'#0e9268',fontSize:7.5,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ Rect.</button>
            <button onClick={()=>{setDrawMode('edic');setDrawPts([])}}
              style={{flex:1,padding:'4px',borderRadius:5,border:'1px dashed rgba(14,146,104,.3)',background:drawMode==='edic'?'rgba(14,146,104,.1)':'none',color:'#0e9268',fontSize:7.5,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>✏ Poly</button>
          </div>
        </div>

        {/* Lanterneaux */}
        <div style={{padding:7,borderRadius:9,border:'1px solid var(--bd)',marginBottom:6}}>
          <div style={{fontSize:8,fontWeight:700,color:'var(--t1)',marginBottom:5}}>💡 Lanterneaux ({az.lanterneaux.length})</div>
          {az.lanterneaux.map((la,i)=><div key={la.id} style={{display:'flex',gap:3,alignItems:'center',marginBottom:3}}>
            <span style={{fontSize:7.5,color:'var(--t3)',flexShrink:0}}>#{i+1}</span>
            <input type="number" value={la.w} step={.1} min={.3} max={6} onChange={e=>setAz({lanterneaux:az.lanterneaux.map(x=>x.id===la.id?{...x,w:+e.target.value}:x)})}

              style={{flex:1,padding:'2px 4px',borderRadius:4,border:'1px solid var(--bd)',background:'var(--inp)',fontSize:8,fontFamily:'monospace',textAlign:'right',color:'var(--t1)'}}/>
            <span style={{fontSize:7,color:'var(--t3)'}}>m</span>
            <button onClick={()=>setAz({lanterneaux:az.lanterneaux.filter(x=>x.id!==la.id)})} style={{fontSize:8,color:'#ef4444',cursor:'pointer',background:'none',border:'none'}}>✕</button>
          </div>)}

            style={{width:'100%',padding:'3px',borderRadius:5,border:'1px dashed var(--bd)',background:'none',color:'var(--t2)',fontSize:7.5,cursor:'pointer',fontFamily:'inherit'}}>+ Descente EP</button>

        {/* Total zone */}
        <div style={{padding:8,borderRadius:9,border:'1px solid rgba(196,50,74,.2)',background:'rgba(196,50,74,.04)'}}>

          <div style={{fontSize:14,fontWeight:800,color:'#c4324a'}}>{r0(zoneTotal(az)).toLocaleString('fr-FR')} €HT</div>
          <div style={{fontSize:8,color:'var(--t3)',marginTop:2}}>Grand total : {r0(grandTotal).toLocaleString('fr-FR')} €HT</div>
        </div>
      </div>

      {/* ── ZONE PRINCIPALE ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,minHeight:0}}>

        {/* ──── TAB : PLAN ──── */}
        {tab==='plan'&&<>
          {drawMode&&<div style={{padding:'5px 14px',background:'rgba(196,50,74,.06)',borderBottom:'1px solid rgba(196,50,74,.15)',display:'flex',alignItems:'center',gap:8,fontSize:10,color:'#c4324a',fontWeight:600}}>
            ✏ {drawMode==='roof'?'Tracé toiture':drawMode==='tremie'?'Trémie — 2 clics (coin opposés)':'Tracé édicule'} — {drawMode==='tremie'?'cliquez 2 coins':'cliquez · double-clic pour fermer'}
            <button onClick={()=>{setDrawMode(null);setDrawPts([])}} style={{color:'#c4324a',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700}}>✕ Annuler</button>
          </div>}
          <div style={{padding:'4px 10px',background:'var(--pnl)',borderBottom:'1px solid var(--bd)',display:'flex',gap:6,alignItems:'center'}}>
            <button onClick={()=>{setDrawMode('roof');setDrawPts([])}} style={{padding:'3px 10px',borderRadius:5,border:'1px solid rgba(126,79,170,.25)',background:drawMode==='roof'?'rgba(126,79,170,.12)':'var(--crd)',color:'#7e4faa',fontSize:9,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✏ Toiture</button>
            <span style={{fontSize:8,color:'var(--t3)'}}>Clic droit = suppr · milieu = insérer · Molette = zoom</span>
            <div style={{flex:1}}/>
            <button onClick={()=>setSnapGrid(v=>!v)} style={{padding:'3px 8px',borderRadius:5,border:'1px solid '+(snapGrid?'rgba(126,79,170,.3)':'var(--bd)'),background:snapGrid?'rgba(126,79,170,.1)':'var(--crd)',color:snapGrid?'#7e4faa':'var(--t3)',fontSize:8,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🧲 {snapGrid?'Aimant 25cm':'Libre'}</button>
            <button onClick={()=>{setSvgZoom(1);setSvgPan({x:0,y:0})}} style={{padding:'3px 8px',borderRadius:5,border:'1px solid var(--bd)',background:'var(--crd)',color:'var(--t3)',fontSize:8,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>⟲ Reset vue</button>
          </div>
          {view3D
            ?<div ref={mountRef} style={{flex:1,background:'#ddd4c8'}}/>
            :<svg ref={svgRef} viewBox={vb} preserveAspectRatio="xMidYMid meet"
              style={{flex:1,background:'#f4ece5',cursor:drawMode?'crosshair':dragPt?'grabbing':'default'}}
              onClick={handleClick} onDoubleClick={handleDbl} onMouseMove={e=>{
                if(panning&&panStart){
                  const dx=(e.clientX-panStart.x)*vbW/svgRef.current.clientWidth;
                  const dy=(e.clientY-panStart.y)*vbH/svgRef.current.clientHeight;
                  setSvgPan({x:svgPan.x-dx,y:svgPan.y-dy});
                  setPanStart({x:e.clientX,y:e.clientY});
                } else handleMM(e);
              }} onMouseUp={e=>{if(panning){setPanning(false);setPanStart(null)}else handleMU(e)}} onMouseLeave={e=>{setPanning(false);setPanStart(null);handleMU(e)}} onContextMenu={e=>e.preventDefault()}
              onWheel={e=>{e.preventDefault();const d=e.deltaY>0?.9:1.1;setSvgZoom(z=>Math.max(.3,Math.min(8,z*d)))}}
              onMouseDown={e=>{if(e.button===1){e.preventDefault();setPanning(true);setPanStart({x:e.clientX,y:e.clientY})}}}>
              <defs>
                <marker id="pente-arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#0ea5e9"/></marker>
                <pattern id="et-grd" width="1" height="1" patternUnits="userSpaceOnUse"><rect width="1" height="1" fill="none" stroke="rgba(42,14,20,.04)" strokeWidth=".01"/></pattern>
                <pattern id="et-grd5" width="5" height="5" patternUnits="userSpaceOnUse"><rect width="5" height="5" fill="none" stroke="rgba(42,14,20,.07)" strokeWidth=".02"/></pattern>
              </defs>
              <rect x={bnd.min[0]-pad} y={bnd.min[1]-pad} width={bnd.w+pad*2} height={bnd.h+pad*2} fill="url(#et-grd)"/>
              <rect x={bnd.min[0]-pad} y={bnd.min[1]-pad} width={bnd.w+pad*2} height={bnd.h+pad*2} fill="url(#et-grd5)"/>
              {/* Toiture */}
              <polygon points={az.roofPts.map(p=>p.join(',')).join(' ')} fill="rgba(126,79,170,.07)" stroke="#7e4faa" strokeWidth=".05"/>
              {/* Acrotère + couvertine bands */}
              {az.roofPts.map((p,i)=>{
                const j=(i+1)%az.roofPts.length;const dxx=az.roofPts[j][0]-p[0],dyy=az.roofPts[j][1]-p[1];
                const len=Math.sqrt(dxx*dxx+dyy*dyy);if(len<.01)return null;
                const nxx=-dyy/len,nyy=dxx/len;// outward normal
                const acOff=.08;const cvDev=Math.max(.15,(az.couvertW||400)/2000);
                return<g key={'cv'+i}>
                  <line x1={p[0]+nxx*acOff} y1={p[1]+nyy*acOff} x2={az.roofPts[j][0]+nxx*acOff} y2={az.roofPts[j][1]+nyy*acOff}
                    stroke="#c4324a" strokeWidth=".1" opacity=".15"/>
                  <line x1={p[0]+nxx*(acOff+.05)} y1={p[1]+nyy*(acOff+.05)} x2={az.roofPts[j][0]+nxx*(acOff+.05)} y2={az.roofPts[j][1]+nyy*(acOff+.05)}
                    stroke="#888" strokeWidth={cvDev} opacity=".1"/>

              {/* Dimensions */}
              {az.roofPts.map((p,i)=>{const j=(i+1)%az.roofPts.length;const mx=(p[0]+az.roofPts[j][0])/2,my=(p[1]+az.roofPts[j][1])/2;const dx2=az.roofPts[j][0]-p[0],dy2=az.roofPts[j][1]-p[1];const len=Math.sqrt(dx2*dx2+dy2*dy2);const ang=Math.atan2(dy2,dx2)*180/Math.PI;
                return<g key={'d'+i}>
                  <rect x={mx-.5} y={my-.42} width={1} height={.25} rx=".06" fill="rgba(244,236,229,.9)" stroke="rgba(126,79,170,.15)" strokeWidth=".01"/>

                    onDoubleClick={e=>{e.stopPropagation();const v=prompt('Longueur du côté (m):',r2(len).toString());if(v&&!isNaN(parseFloat(v))){

                    }}}>{r2(len)}m</text>
                </g>})}
              {/* Handles toiture */}
              {!drawMode&&az.roofPts.map((p,i)=><circle key={'rp'+i} cx={p[0]} cy={p[1]} r=".22" fill="#7e4faa" stroke="#fff" strokeWidth=".06" style={{cursor:'grab'}}
                onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'roof',idx:i})}}
                onContextMenu={e=>{e.preventDefault();e.stopPropagation();if(az.roofPts.length>3)setAz({roofPts:az.roofPts.filter((_,j2)=>j2!==i)})}}/>)}
              {/* Midpoints */}
              {!drawMode&&az.roofPts.map((p,i)=>{const j=(i+1)%az.roofPts.length;const mx=(p[0]+az.roofPts[j][0])/2,my=(p[1]+az.roofPts[j][1])/2;return<circle key={'mp'+i} cx={mx} cy={my} r=".14" fill="none" stroke="#7e4faa" strokeWidth=".04" strokeDasharray=".06,.06" style={{cursor:'pointer'}} onClick={e=>{e.stopPropagation();setAz({roofPts:[...az.roofPts.slice(0,i+1),[mx,my],...az.roofPts.slice(i+1)]})}}/> })}
              {/* Édicules */}
              {az.edicules.map(ed=><g key={ed.id}>
                <polygon points={ed.pts.map(p=>p.join(',')).join(' ')} fill="rgba(14,146,104,.1)" stroke={selEdic===ed.id?'#0e9268':'rgba(14,146,104,.5)'} strokeWidth={selEdic===ed.id?'.07':'.04'} style={{cursor:'move'}}
                  onClick={e=>{e.stopPropagation();setSelEdic(ed.id)}}

                <text x={polyCtr(ed.pts)[0]} y={polyCtr(ed.pts)[1]+.08} textAnchor="middle" fill="#0e9268" fontSize=".2" fontWeight="700" style={{pointerEvents:'none'}}>{ed.name}</text>
                {selEdic===ed.id&&ed.pts.map((ep,ei)=><circle key={'ep'+ei} cx={ep[0]} cy={ep[1]} r=".14" fill="#0e9268" stroke="#fff" strokeWidth=".04" style={{cursor:'grab'}}
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'edic_pt',edicId:ed.id,idx:ei})}}/>)}
                {ed.hasLant&&(()=>{const ec=polyCtr(ed.pts);return<rect x={ec[0]-ed.lantW/2000} y={ec[1]-ed.lantL/2000} width={ed.lantW/1000} height={ed.lantL/1000} fill="rgba(14,165,233,.15)" stroke="#0ea5e9" strokeWidth=".03" rx=".03"/>})()}
              </g>)}
              {/* Lanterneaux */}
              {az.lanterneaux.map((la,i)=><g key={la.id}>
                <rect x={la.x-la.w/2} y={la.y-la.l/2} width={la.w} height={la.l} fill="rgba(14,165,233,.12)" stroke="#0ea5e9" strokeWidth=".04" rx=".04" style={{cursor:'move'}}
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'lant',idx:i})}}/>
                <text x={la.x} y={la.y+.06} textAnchor="middle" fill="#0ea5e9" fontSize=".17" fontWeight="600" style={{pointerEvents:'none'}}>L{i+1} {la.w}×{la.l}m</text>
                <circle cx={la.x+la.w/2} cy={la.y+la.l/2} r=".1" fill="#0ea5e9" stroke="#fff" strokeWidth=".03" style={{cursor:'se-resize'}}
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'lant_r',idx:i})}}/>
              </g>)}
              {/* Trémies */}
              {(az.tremies||[]).map((tr,i)=><g key={tr.id}>
                <rect x={tr.x-tr.w/2} y={tr.y-tr.l/2} width={tr.w} height={tr.l} fill="rgba(239,68,68,.1)" stroke="#ef4444" strokeWidth=".04" strokeDasharray=".12,.08" rx=".04"
                  style={{cursor:'move'}} onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'trem',idx:i})}}/>
                <line x1={tr.x-tr.w/2} y1={tr.y-tr.l/2} x2={tr.x+tr.w/2} y2={tr.y+tr.l/2} stroke="#ef4444" strokeWidth=".02" opacity=".3"/>
                <line x1={tr.x+tr.w/2} y1={tr.y-tr.l/2} x2={tr.x-tr.w/2} y2={tr.y+tr.l/2} stroke="#ef4444" strokeWidth=".02" opacity=".3"/>
                <text x={tr.x} y={tr.y+.06} textAnchor="middle" fill="#ef4444" fontSize=".17" fontWeight="600" style={{pointerEvents:'none'}}>T{i+1} {r2(tr.w)}×{r2(tr.l)}</text>
                <circle cx={tr.x+tr.w/2} cy={tr.y+tr.l/2} r=".1" fill="#ef4444" stroke="#fff" strokeWidth=".03" style={{cursor:'se-resize'}}
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'trem_r',idx:i})}}/>
                <circle cx={tr.x} cy={tr.y} r=".08" fill="#ef4444" opacity=".4" style={{pointerEvents:'none'}}/>
              </g>)}
              {/* Pente indicator */}
              {(az.pente||0)>0&&(()=>{const ct2=polyCtr(az.roofPts);const dir=az.penteDir||'ew';
                const arrowLen=Math.min(bnd.w,bnd.h)*.3;

                return<g opacity=".4">
                  <line x1={ct2[0]-dx/2} y1={ct2[1]-dy/2} x2={ct2[0]+dx/2} y2={ct2[1]+dy/2} stroke="#0ea5e9" strokeWidth=".06" markerEnd="url(#pente-arr)"/>
                  <text x={ct2[0]+dx/2+.3} y={ct2[1]+dy/2+.06} fill="#0ea5e9" fontSize=".18" fontWeight="600">{az.pente}%</text>
                </g>
              })()}
              {/* EP */}
              {az.eps.map((ep,i)=><g key={ep.id}>
                <circle cx={ep.x} cy={ep.y} r=".28" fill="rgba(14,165,233,.15)" stroke="#0ea5e9" strokeWidth=".06" style={{cursor:'grab'}}
                  onMouseDown={e=>{e.stopPropagation();e.preventDefault();setDragPt({type:'ep',idx:i})}}
                  onContextMenu={e=>{e.preventDefault();e.stopPropagation();setAz({eps:az.eps.filter((_,j2)=>j2!==i)})}}/>
                <text x={ep.x} y={ep.y+.07} textAnchor="middle" fill="#0ea5e9" fontSize=".18" fontWeight="700" style={{pointerEvents:'none'}}>EP{i+1}</text>
              </g>)}
              {/* Draw preview */}
              {drawMode&&drawPts.length>0&&<>
                <polyline points={drawPts.map(p=>p.join(',')).join(' ')} fill="none" stroke="#c4324a" strokeWidth=".06" strokeDasharray=".15,.1"/>
                {drawPts.map((p,i)=><circle key={'dp'+i} cx={p[0]} cy={p[1]} r=".15" fill="#c4324a"/>)}
              </>}
              {/* Area label */}
              {(()=>{const c=polyCtr(az.roofPts);return<text x={c[0]} y={c[1]} textAnchor="middle" fill="#7e4faa" fontSize=".45" fontWeight="800" opacity=".2">{r2(st.nette)} m²</text>})()}
            </svg>}
        </>}

        {/* ──── TAB : PRESTATIONS ──── */}
        {tab==='presta'&&<div style={{flex:1,overflowY:'auto',padding:16}}>
          <div style={{marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontSize:13,fontWeight:800,color:'var(--t1)'}}>{az.name}</div>
            <div style={{fontSize:11,color:'var(--t3)'}}>Surface nette : <b style={{color:'var(--t1)'}}>{r2(st.nette)} m²</b> · Périmètre : <b style={{color:'var(--t1)'}}>{r2(st.peri)} ml</b> · EP : <b style={{color:'var(--t1)'}}>{st.eps}</b></div>

            return<div key={cat} style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:800,color:'var(--t2)',borderBottom:'1px solid var(--bd)',paddingBottom:5,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>

                        style={{width:'100%',padding:'2px 4px',borderRadius:5,border:'1px solid '+(cfg.qtyOverride!=null?'rgba(245,158,11,.5)':'var(--bd)'),background:'var(--inp)',color:'var(--t1)',fontSize:9,fontFamily:'monospace',textAlign:'right'}}/>

    scene.add(GRP);
    // Camera
    const camTgt={x:0,y:ht/2,z:0};const camD=Math.max(L,totZ)*1.7+7;

      else{rot.t=dr.t-(e.clientX-dr.x)*.32;rot.p=Math.max(-80,Math.min(80,dr.p+(e.clientY-dr.y)*.26))}};
